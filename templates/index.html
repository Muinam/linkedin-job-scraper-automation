<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Job Scraper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'Segoe UI', system-ui, sans-serif; 
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
    min-height: 100vh; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
  }
  .container { 
    background: white; 
    border-radius: 16px; 
    padding: 40px; 
    width: 100%; 
    max-width: 620px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
  }
  .logo { 
    display: flex; 
    align-items: center; 
    gap: 14px; 
    margin-bottom: 32px; 
  }
  .logo-icon { 
    width: 48px; 
    height: 48px; 
    background: #0077b5; 
    border-radius: 10px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    color: white; 
    font-weight: bold; 
    font-size: 24px; 
  }
  h1 { 
    font-size: 26px; 
    color: #1a1a2e; 
    font-weight: 600; 
  }
  .subtitle { 
    font-size: 14px; 
    color: #666; 
    margin-top: 4px; 
  }

  .section { margin-bottom: 24px; }
  label { 
    display: block; 
    font-size: 14px; 
    font-weight: 600; 
    color: #333; 
    margin-bottom: 8px; 
  }
  input, textarea { 
    width: 100%; 
    padding: 14px; 
    border: 2px solid #e0e0e0; 
    border-radius: 10px; 
    font-size: 15px; 
    outline: none; 
    transition: all 0.3s; 
  }
  input:focus, textarea:focus { 
    border-color: #0077b5; 
    box-shadow: 0 0 0 3px rgba(0,119,181,0.1); 
  }
  textarea { resize: vertical; min-height: 90px; }

  .hint { 
    font-size: 12.5px; 
    color: #888; 
    margin-top: 6px; 
  }

  .lvl-wrap { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 10px; 
    margin-top: 8px; 
  }
  .lvl-label { 
    padding: 8px 16px; 
    border: 2px solid #e0e0e0; 
    border-radius: 30px; 
    font-size: 14px; 
    cursor: pointer; 
    transition: all 0.2s; 
  }
  .lvl-label:hover { background: #f0f7ff; }
  .lvl-label:has(input:checked) { 
    border-color: #0077b5; 
    background: #e3f2fd; 
    color: #0077b5; 
    font-weight: 500; 
  }

  .btn { 
    width: 100%; 
    padding: 16px; 
    background: #0077b5; 
    color: white; 
    border: none; 
    border-radius: 12px; 
    font-size: 16px; 
    font-weight: 600; 
    cursor: pointer; 
    margin-top: 10px; 
    transition: all 0.3s; 
  }
  .btn:hover { background: #005f8e; }
  .btn:disabled { background: #aaa; cursor: not-allowed; }

  .btn-dl { 
    width: 100%; 
    padding: 14px; 
    background: white; 
    color: #0077b5; 
    border: 2px solid #0077b5; 
    border-radius: 12px; 
    font-size: 15px; 
    font-weight: 600; 
    cursor: pointer; 
    margin-top: 12px; 
  }
  .btn-dl:hover { background: #f0f7ff; }

  .status-box { 
    margin-top: 25px; 
    padding: 18px; 
    border-radius: 12px; 
    font-size: 14px; 
    display: none; 
  }
  .status-box.running { background: #fff8e1; border: 1px solid #ffc107; color: #7a5c00; display: block; }
  .status-box.success { background: #e8f5e9; border: 1px solid #4caf50; color: #2e7d32; display: block; }
</style>
</head>
<body>
<div class="container">

  <div class="logo">
    <div class="logo-icon">in</div>
    <div>
      <h1>LinkedIn Job Scraper</h1>
      <div class="subtitle">Fresh Job Alerts • AI & Tech Roles</div>
    </div>
  </div>

  <div class="section">
    <label>Job Keywords</label>
    <textarea id="keywords" placeholder="Machine Learning Engineer&#10;Data Scientist&#10;AI Engineer"></textarea>
    <div class="hint">One keyword per line</div>
  </div>

  <div class="section">
    <label>Experience Level Filter (Optional)</label>
    <div class="lvl-wrap">
      <label class="lvl-label"><input type="checkbox" value="Intern" class="lvl"> Intern</label>
      <label class="lvl-label"><input type="checkbox" value="Entry Level" class="lvl"> Entry Level</label>
      <label class="lvl-label"><input type="checkbox" value="Mid Level" class="lvl"> Mid Level</label>
      <label class="lvl-label"><input type="checkbox" value="Senior" class="lvl"> Senior</label>
      <label class="lvl-label"><input type="checkbox" value="Consultant/Manager" class="lvl"> Consultant</label>
    </div>
    <div class="hint">Leave unselected to get all levels</div>
  </div>

  <div class="section">
    <label>Location</label>
    <input id="location" type="text" value="Pakistan">
  </div>

  <div class="section">
    <label>Email Addresses</label>
    <textarea id="emails" placeholder="your.email@gmail.com&#10;another.email@gmail.com" style="min-height:70px"></textarea>
    <div class="hint">One email per line</div>
  </div>

  <button class="btn" id="btn" onclick="startScrape()">Start Scraping</button>
  <button class="btn-dl" id="dl-btn" onclick="downloadCSV()" style="display:none">Download CSV Report</button>

  <div class="status-box" id="status">
    <div id="status-text"></div>
    <div class="progress-bar"><div class="progress-fill" id="pbar"></div></div>
    <div class="log" id="log"></div>
  </div>

</div>

<script>
function log(msg, type='info') {
  const el = document.getElementById('log');
  el.innerHTML += `<div style="margin:3px 0">> ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function setProgress(p) {
  document.getElementById('pbar').style.width = p + '%';
}

function downloadCSV() {
  window.location.href = '/download-csv';
}

async function startScrape() {
  const kwRaw = document.getElementById('keywords').value.trim();
  const location = document.getElementById('location').value.trim();
  const emRaw = document.getElementById('emails').value.trim();

  if (!kwRaw) { alert('Please enter at least one keyword'); return; }
  if (!location) { alert('Please enter location'); return; }
  if (!emRaw) { alert('Please enter at least one email'); return; }

  const keywords = kwRaw.split('\n').map(k => k.trim()).filter(Boolean);
  const emails = emRaw.split('\n').map(e => e.trim()).filter(Boolean);
  const levels = [...document.querySelectorAll('.lvl:checked')].map(c => c.value);

  const btn = document.getElementById('btn');
  const dlBtn = document.getElementById('dl-btn');
  const status = document.getElementById('status');

  btn.disabled = true;
  dlBtn.style.display = 'none';
  btn.textContent = 'Scraping in Progress...';
  status.className = 'status-box running';
  document.getElementById('log').innerHTML = '';
  document.getElementById('status-text').textContent = 'Connecting to LinkedIn...';
  setProgress(5);

  try {
    const res = await fetch('/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keywords, location, emails, levels })
    });

    const data = await res.json();

    log(`Task started: ${data.task_id}`);
    setProgress(20);

    let pct = 20;
    const timer = setInterval(() => {
      pct = Math.min(pct + 4, 92);
      setProgress(pct);
    }, 3500);

    setTimeout(() => {
      clearInterval(timer);
      setProgress(100);
      status.className = 'status-box success';
      document.getElementById('status-text').textContent = 'Scraping Completed Successfully!';
      log('✅ Jobs saved to database', 'ok');
      log('✅ Google Sheet updated', 'ok');
      log('✅ Emails sent', 'ok');
      dlBtn.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Start New Scrape';
    }, 180000);

  } catch(err) {
    status.className = 'status-box error';
    document.getElementById('status-text').textContent = 'Error occurred';
    log('❌ ' + err.message, 'err');
    btn.disabled = false;
    btn.textContent = 'Start Scraping';
  }
}
</script>
</body>
</html>
